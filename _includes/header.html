<header class="site-header">
  <div class="shell header-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="KelvSec home">
      <img src="{{ '/images/KelvSec.png' | relative_url }}" alt="" width="44" height="44">
      <span>KelvSec</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a>
      <a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog/' %} aria-current="page"{% endif %}>Blog</a>
      <a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects/' %} aria-current="page"{% endif %}>Projects</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about/' %} aria-current="page"{% endif %}>About</a>
    </nav>
  </div>
</header>
