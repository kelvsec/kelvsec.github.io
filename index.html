<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KelvSec - Research Blog </title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050816;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    .logo {
      display: block;
      width: clamp(140px, 35vw, 260px);
      height: auto;
      margin: 0 auto 24px;
      border-radius: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
    }

    p {
      margin: 0;
      color: #21f3a3;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
    }
  </style>
</head>

<body>
  <main class="container">
    <img
      src="images/KelvSec.png"
      alt="KelvSec logo"
      class="logo"
    >

    <h1>The site is now live. Research coming soon.</h1>
    <p>Hosted on GitHub pages</p>
  </main>
</body>
</html>
