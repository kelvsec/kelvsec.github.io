---
---
<!doctype html>
<html lang="{{ site.lang | default: 'en-IE' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#070b14">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/kelvsec.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }} RSS feed" href="{{ '/feed.xml' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    {% include header.html %}
    <main id="main-content">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
